data:
  # Keep raw data outside GitHub. This is only a local path template.
  root_dir: "/path/to/local/dyslexia_project/Anyalysis/group"
  derivatives_dir: "derivatives/preprocessed"
  group_dirs:
    G1_3: "G1_3"
    G4_6: "G4_6"
  snirf_pattern: "*.snirf"

events:
  # Mapping recovered from the original MATLAB nirs-toolbox pipeline:
  # stim_channel1 -> MA, stim_channel2 -> PA, stim_channel3 -> Control.
  condition_map:
    "1": "MA"
    "2": "PA"
    "3": "Control"
  expected_counts:
    MA: 16
    Control: 16

preprocessing:
  resample_hz: 2
  ppf: 6.0
  short_channel_threshold_m: 0.01
  trim_baseline_sec:
    pre: 5
    post: 5
  hrf_peak_time_sec: 6
  add_short_separation_regressors: true

analysis:
  glm:
    input_dir: "derivatives/preprocessed"
    stim_duration_sec: 10
    hrf_model: "glover"
    drift_model: "cosine"
    high_pass: 0.008
    noise_model: "ar1"
    add_short_channel_regressors: true
    short_channel_max_dist_m: 0.01
    output_dir: "derivatives/first_level_glm"
    beta_table: "results/first_level_betas_ssreg.csv"
    contrast_table: "results/first_level_contrasts_ssreg.csv"
    summary_table: "results/first_level_glm_summary_ssreg.csv"
    primary_contrast_name: "MA-Control"
  group:
    contrast_table: "results/first_level_contrasts_ssreg.csv"
    preprocessed_input_dir: "derivatives/preprocessed"
    long_hbo_only: true
    output_table: "results/group_level_channel_stats_ssreg_long_hbo.csv"
    summary_table: "results/group_level_summary_ssreg_long_hbo.csv"
    alpha: 0.05
    comparisons:
      - "G1_3 MA-Control"
      - "G4_6 MA-Control"
      - "G4_6 minus G1_3 MA-Control"
  validation:
    matlab_export_dir: "validation/matlab_preprocessed"
    python_preprocessed_dir: "derivatives/preprocessed"
    output_table: "results/matlab_mne_preprocessing_validation.csv"
    summary_table: "results/matlab_mne_preprocessing_validation_summary.csv"
  first_level_conditions:
    - MA
    - PA
    - Control
  primary_contrasts:
    - name: "G4_6 MA - Control"
      expression: "G4_6:MA - G4_6:Control"
    - name: "G1_3 MA - Control"
      expression: "G1_3:MA - G1_3:Control"
    - name: "G4_6 MA effect - G1_3 MA effect"
      expression: "(G4_6:MA - G4_6:Control) - (G1_3:MA - G1_3:Control)"
